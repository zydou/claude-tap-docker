---
name: Build

on:
  workflow_dispatch:
  push:
    paths:
      - Dockerfile
      - .github/workflows/build.yml
  schedule:
    - cron: "0 16 * * *"

permissions: write-all

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.check_version.outputs.should_build }}
    steps:
      - name: Get latest claude-tap version from PyPI
        id: version
        run: |
          VERSION=$(curl -fsSL https://pypi.org/pypi/claude-tap/json | jq -r '.info.version')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest claude-tap version on PyPI: ${VERSION}"

      - name: Check if this version has already been built
        id: check_version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG="v${{ steps.version.outputs.version }}"
          echo "Looking for existing image tag: ${TAG}"

          # On schedule, skip the build when the version tag already exists in GHCR.
          # On push/workflow_dispatch we always rebuild (the Dockerfile/workflow changed).
          if [ "${{ github.event_name }}" = "schedule" ]; then
          TAGS=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" "https://api.github.com/users/${OWNER_LC}/packages/container/claude-tap/versions?per_page=100" | jq -r '.[].metadata.container.tags[]?' || true)
          if echo "$TAGS" | grep -qx "$TAG"; then
          echo "Tag ${TAG} already exists in GHCR, skipping build."
          echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
          echo "Tag ${TAG} not found in GHCR, a new build is needed."
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi
          else
          echo "Triggered by ${{ github.event_name }}, forcing a build."
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build != 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Login to GHCR
        uses: docker/login-action@master
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Build and push Docker image
        uses: docker/build-push-action@master
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/claude-tap:v${{ needs.check.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/claude-tap:latest
